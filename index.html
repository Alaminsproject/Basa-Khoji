<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বাসা খুঁজি</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f0f2f5; color: #333; }
  .header { background: #2e7d32; color: white; padding: 15px 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 22px; }
  .nav { display: flex; gap: 10px; justify-content: center; margin-top: 8px; }
  .nav button { background: rgba(255,255,255,0.2); color: white; border: none; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; }
  .nav button.active { background: white; color: #2e7d32; font-weight: bold; }
  .page { display: none; padding: 15px; max-width: 600px; margin: 0 auto; }
  .page.active { display: block; }
  .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .card h3 { color: #2e7d32; margin-bottom: 5px; }
  .card .price { font-size: 18px; font-weight: bold; color: #e65100; margin: 8px 0; }
  .card .info { font-size: 13px; color: #666; }
  .card .badge { display: inline-block; background: #e8f5e9; color: #2e7d32; padding: 3px 10px; border-radius: 20px; font-size: 12px; margin: 5px 5px 5px 0; }
  input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
  textarea { height: 80px; resize: none; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
  .btn-green { background: #2e7d32; color: white; }
  .btn-outline { background: white; color: #2e7d32; border: 2px solid #2e7d32; margin-top: 8px; }
  .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
  .search-box input { margin: 0; }
  .search-box button { background: #2e7d32; color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-size: 14px; white-space: nowrap; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; }
  .filter-row select { margin: 0; min-width: 130px; }
  .msg { text-align: center; padding: 20px; color: #999; }
  .contact-btn { background: #2e7d32; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; margin-top: 10px; font-size: 14px; }
  .user-info { background: #e8f5e9; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; }
  .tab-row { display: flex; gap: 8px; margin-bottom: 15px; }
  .tab { flex: 1; padding: 10px; text-align: center; border: 2px solid #2e7d32; border-radius: 8px; cursor: pointer; font-size: 14px; color: #2e7d32; }
  .tab.active { background: #2e7d32; color: white; font-weight: bold; }
  label { font-size: 13px; color: #555; margin-bottom: 4px; display: block; }
  .empty-state { text-align: center; padding: 40px 20px; color: #999; }
  .empty-state .icon { font-size: 50px; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="header">
  <h1>🏠 বাসা খুঁজি</h1>
  <div class="nav">
    <button class="active" onclick="showPage('home')">হোম</button>
    <button onclick="showPage('search')">খুঁজুন</button>
    <button onclick="showPage('add')">যোগ করুন</button>
    <button onclick="showPage('account')">অ্যাকাউন্ট</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div style="background: linear-gradient(135deg, #2e7d32, #66bb6a); color: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; text-align: center;">
    <h2 style="font-size: 20px; margin-bottom: 8px;">আপনার স্বপ্নের বাসা খুঁজুন</h2>
    <p style="font-size: 13px; opacity: 0.9;">ভাড়া বাসা, মেস, হোস্টেল — সব এক জায়গায়</p>
  </div>
  
  <div class="search-box">
    <input type="text" id="homeSearch" placeholder="এলাকার নাম লিখুন...">
    <button onclick="doSearch()">খুঁজুন</button>
  </div>

  <h3 style="margin-bottom: 12px; color: #555;">সাম্প্রতিক বিজ্ঞাপন</h3>
  <div id="recentList"><div class="msg">লোড হচ্ছে...</div></div>
</div>

<!-- SEARCH -->
<div id="search" class="page">
  <h2 style="margin-bottom: 15px; color: #2e7d32;">🔍 বাসা খুঁজুন</h2>
  
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="এলাকার নাম...">
    <button onclick="searchProperties()">খুঁজুন</button>
  </div>

  <div class="filter-row">
    <select id="filterType" onchange="searchProperties()">
      <option value="">সব ধরন</option>
      <option value="rent">ভাড়া বাসা</option>
      <option value="mess">মেস</option>
      <option value="hotel">হোটেল</option>
      <option value="sublet">সাবলেট</option>
    </select>
    <select id="filterPrice" onchange="searchProperties()">
      <option value="">সব বাজেট</option>
      <option value="3000">৩০০০ এর নিচে</option>
      <option value="5000">৫০০০ এর নিচে</option>
      <option value="10000">১০০০০ এর নিচে</option>
      <option value="20000">২০০০০ এর নিচে</option>
    </select>
  </div>

  <div id="searchResults"><div class="empty-state"><div class="icon">🏘️</div><p>উপরে এলাকার নাম লিখে খুঁজুন</p></div></div>
</div>

<!-- ADD PROPERTY -->
<div id="add" class="page">
  <h2 style="margin-bottom: 15px; color: #2e7d32;">➕ বিজ্ঞাপন দিন</h2>
  
  <div id="addLoginMsg" class="card" style="text-align:center; display:none;">
    <p style="margin-bottom: 10px;">বিজ্ঞাপন দিতে আগে লগইন করুন</p>
    <button class="btn btn-green" onclick="showPage('account')">লগইন করুন</button>
  </div>

  <div id="addForm">
    <div class="card">
      <label>বাসার শিরোনাম *</label>
      <input type="text" id="propTitle" placeholder="যেমন: ২ রুমের ফ্ল্যাট ভাড়া, মিরপুর">
      
      <label>ধরন *</label>
      <select id="propType">
        <option value="rent">ভাড়া বাসা</option>
        <option value="mess">মেস</option>
        <option value="hotel">হোটেল/আবাসিক</option>
        <option value="sublet">সাবলেট</option>
      </select>

      <label>এলাকা *</label>
      <input type="text" id="propArea" placeholder="যেমন: মিরপুর-১০, ঢাকা">
      
      <label>ঠিকানা</label>
      <input type="text" id="propLocation" placeholder="বিস্তারিত ঠিকানা">

      <label>ভাড়া (টাকা/মাস) *</label>
      <input type="number" id="propPrice" placeholder="যেমন: 8000">

      <label>রুম সংখ্যা</label>
      <input type="number" id="propRooms" placeholder="যেমন: 2">

      <label>বিবরণ</label>
      <textarea id="propDesc" placeholder="বাসার সুবিধা, নিয়মকানুন ইত্যাদি লিখুন..."></textarea>

      <label>যোগাযোগ নম্বর *</label>
      <input type="tel" id="propContact" placeholder="01*********">

      <button class="btn btn-green" onclick="addProperty()">বিজ্ঞাপন প্রকাশ করুন</button>
    </div>
  </div>
</div>

<!-- ACCOUNT -->
<div id="account" class="page">
  <h2 style="margin-bottom: 15px; color: #2e7d32;">👤 অ্যাকাউন্ট</h2>
  
  <div id="loggedOut">
    <div class="tab-row">
      <div class="tab active" onclick="switchAuthTab('login')">লগইন</div>
      <div class="tab" onclick="switchAuthTab('register')">নিবন্ধন</div>
    </div>

    <div id="loginForm" class="card">
      <label>ইমেইল</label>
      <input type="email" id="loginEmail" placeholder="আপনার ইমেইল">
      <label>পাসওয়ার্ড</label>
      <input type="password" id="loginPass" placeholder="পাসওয়ার্ড">
      <button class="btn btn-green" onclick="login()">লগইন করুন</button>
    </div>

    <div id="registerForm" class="card" style="display:none;">
      <label>নাম</label>
      <input type="text" id="regName" placeholder="আপনার নাম">
      <label>ইমেইল</label>
      <input type="email" id="regEmail" placeholder="আপনার ইমেইল">
      <label>ফোন নম্বর</label>
      <input type="tel" id="regPhone" placeholder="01XXXXXXXXX">
      <label>পাসওয়ার্ড</label>
      <input type="password" id="regPass" placeholder="পাসওয়ার্ড (কমপক্ষে ৬ অক্ষর)">
      <label>আপনি কি?</label>
      <select id="regRole">
        <option value="tenant">ভাড়াটিয়া (বাসা খুঁজছি)</option>
        <option value="owner">বাড়িওয়ালা (বাসা ভাড়া দেব)</option>
      </select>
      <button class="btn btn-green" onclick="register()">নিবন্ধন করুন</button>
    </div>
  </div>

  <div id="loggedIn" style="display:none;">
    <div class="user-info">
      <strong id="userName"></strong><br>
      <span id="userEmail" style="color:#666; font-size:12px;"></span>
    </div>
    
    <div class="card">
      <h3 style="margin-bottom: 12px;">আমার বিজ্ঞাপন</h3>
      <div id="myProperties"><div class="msg">লোড হচ্ছে...</div></div>
    </div>

    <button class="btn btn-outline" onclick="logout()">লগআউট</button>
  </div>
</div>

<!-- PROPERTY MODAL -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; overflow-y:auto;">
  <div style="background:white; margin:20px; border-radius:12px; padding:20px; max-width:560px; margin-left:auto; margin-right:auto;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
      <h3 id="modalTitle" style="color:#2e7d32;"></h3>
      <button onclick="closeModal()" style="background:none; border:none; font-size:22px; cursor:pointer;">✕</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<script>
// ⚠️ এখানে তোমার Supabase URL এবং KEY বসাও
const SUPABASE_URL = 'https://fvlwxetbhoqtyjtygnqb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_J0dlJbtGUUyCNtCC4aIGmA_8h_ajyJx';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

// Page Navigation
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const idx = ['home','search','add','account'].indexOf(id);
  document.querySelectorAll('.nav button')[idx].classList.add('active');
  if(id === 'home') loadRecent();
  if(id === 'add') checkAddAccess();
  if(id === 'account' && currentUser) loadMyProperties();
}

// Auth Tab
function switchAuthTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
}

// Register
async function register() {
  const name = document.getElementById('regName').value;
  const email = document.getElementById('regEmail').value;
  const phone = document.getElementById('regPhone').value;
  const pass = document.getElementById('regPass').value;
  const role = document.getElementById('regRole').value;
  
  if(!name || !email || !pass) return alert('সব তথ্য দিন');
  
  const { data, error } = await db.auth.signUp({ email, password: pass });
  if(error) return alert('সমস্যা: ' + error.message);
  
  await db.from('profiles').insert({ id: data.user.id, name, phone, role });
  alert('নিবন্ধন সফল! ইমেইল যাচাই করুন।');
}

// Login
async function login() {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  if(!email || !pass) return alert('ইমেইল ও পাসওয়ার্ড দিন');
  
  const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
  if(error) return alert('সমস্যা: ' + error.message);
  
  currentUser = data.user;
  showLoggedIn();
}

// Logout
async function logout() {
  await db.auth.signOut();
  currentUser = null;
  document.getElementById('loggedIn').style.display = 'none';
  document.getElementById('loggedOut').style.display = 'block';
}

async function showLoggedIn() {
  const { data: profile } = await db.from('profiles').select('*').eq('id', currentUser.id).single();
  document.getElementById('loggedOut').style.display = 'none';
  document.getElementById('loggedIn').style.display = 'block';
  document.getElementById('userName').textContent = profile?.name || 'ব্যবহারকারী';
  document.getElementById('userEmail').textContent = currentUser.email;
  loadMyProperties();
}

// Check session on load
db.auth.getSession().then(({ data }) => {
  if(data.session) {
    currentUser = data.session.user;
  }
});

// Load Recent
async function loadRecent() {
  const { data } = await db.from('properties').select('*').order('created_at', { ascending: false }).limit(10);
  renderList('recentList', data);
}

// Search
function doSearch() {
  const val = document.getElementById('homeSearch').value;
  document.getElementById('searchInput').value = val;
  showPage('search');
  searchProperties();
}

async function searchProperties() {
  const term = document.getElementById('searchInput').value;
  const type = document.getElementById('filterType').value;
  const price = document.getElementById('filterPrice').value;

  let query = db.from('properties').select('*');
  if(term) query = query.ilike('area', `%${term}%`);
  if(type) query = query.eq('type', type);
  if(price) query = query.lte('price', parseInt(price));
  query = query.order('created_at', { ascending: false });

  const { data } = await query;
  renderList('searchResults', data);
}

// Render List
function renderList(containerId, data) {
  const container = document.getElementById(containerId);
  if(!data || data.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🏘️</div><p>কোনো বিজ্ঞাপন পাওয়া যায়নি</p></div>';
    return;
  }
  const typeLabel = { rent:'ভাড়া বাসা', mess:'মেস', hotel:'হোটেল', sublet:'সাবলেট' };
  container.innerHTML = data.map(p => `
    <div class="card" onclick="openModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <h3>${p.title}</h3>
      <div class="price">৳ ${p.price?.toLocaleString('bn-BD')}/মাস</div>
      <span class="badge">${typeLabel[p.type] || p.type}</span>
      <span class="badge">📍 ${p.area}</span>
      ${p.rooms ? `<span class="badge">🛏️ ${p.rooms} রুম</span>` : ''}
      <div class="info" style="margin-top:8px;">${p.description?.substring(0,80) || ''}${p.description?.length > 80 ? '...' : ''}</div>
    </div>
  `).join('');
}

// Modal
function openModal(p) {
  const typeLabel = { rent:'ভাড়া বাসা', mess:'মেস', hotel:'হোটেল', sublet:'সাবলেট' };
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalContent').innerHTML = `
    <div class="price">৳ ${p.price?.toLocaleString('bn-BD')}/মাস</div>
    <span class="badge">${typeLabel[p.type] || p.type}</span>
    <span class="badge">📍 ${p.area}</span>
    ${p.rooms ? `<span class="badge">🛏️ ${p.rooms} রুম</span>` : ''}
    <p style="margin: 12px 0; font-size: 14px; line-height: 1.6;">${p.description || ''}</p>
    <p style="font-size:13px; color:#666;">📌 ${p.location || ''}</p>
    <button class="contact-btn" onclick="callOwner('${p.contact}')">📞 যোগাযোগ করুন: ${p.contact}</button>
  `;
  document.getElementById('modal').style.display = 'block';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function callOwner(number) {
  window.location.href = 'tel:' + number;
}

// Add Property
function checkAddAccess() {
  if(!currentUser) {
    document.getElementById('addLoginMsg').style.display = 'block';
    document.getElementById('addForm').style.display = 'none';
  } else {
    document.getElementById('addLoginMsg').style.display = 'none';
    document.getElementById('addForm').style.display = 'block';
  }
}

async function addProperty() {
  if(!currentUser) return alert('আগে লগইন করুন');
  const title = document.getElementById('propTitle').value;
  const type = document.getElementById('propType').value;
  const area = document.getElementById('propArea').value;
  const location = document.getElementById('propLocation').value;
  const price = document.getElementById('propPrice').value;
  const rooms = document.getElementById('propRooms').value;
  const description = document.getElementById('propDesc').value;
  const contact = document.getElementById('propContact').value;

  if(!title || !area || !price || !contact) return alert('* চিহ্নিত সব তথ্য দিন');

  const { error } = await db.from('properties').insert({
    user_id: currentUser.id, title, type, area, location,
    price: parseInt(price), rooms: parseInt(rooms) || null,
    description, contact
  });

  if(error) return alert('সমস্যা হয়েছে: ' + error.message);
  alert('✅ বিজ্ঞাপন প্রকাশ হয়েছে!');
  
  // Clear form
  ['propTitle','propArea','propLocation','propPrice','propRooms','propDesc','propContact'].forEach(id => document.getElementById(id).value = '');
  showPage('home');
}

// My Properties
async function loadMyProperties() {
  if(!currentUser) return;
  const { data } = await db.from('properties').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
  const container = document.getElementById('myProperties');
  if(!data || data.length === 0) {
    container.innerHTML = '<p style="color:#999; font-size:14px;">এখনো কোনো বিজ্ঞাপন নেই</p>';
    return;
  }
  container.innerHTML = data.map(p => `
    <div style="border-bottom: 1px solid #eee; padding: 10px 0;">
      <strong>${p.title}</strong>
      <div style="font-size:13px; color:#666;">৳${p.price}/মাস · ${p.area}</div>
      <button onclick="deleteProperty('${p.id}')" style="background:none; border:none; color:red; font-size:13px; cursor:pointer; margin-top:4px;">🗑️ মুছুন</button>
    </div>
  `).join('');
}

async function deleteProperty(id) {
  if(!confirm('এই বিজ্ঞাপনটি মুছবেন?')) return;
  await db.from('properties').delete().eq('id', id);
  loadMyProperties();
}

// Load on start
loadRecent();
</script>
</body>
</html>
